name: PR Build Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Build extension
        run: bun run build

      - name: Check build output
        run: |
          echo "Checking build output..."
          ls -la dist/
          
          # Verify required files exist
          test -f dist/manifest.json || exit 1
          test -f dist/rules.json || exit 1
          test -f dist/background.js || exit 1
          test -f dist/quest-code.js || exit 1
          test -f dist/quest-home.js || exit 1
          test -f dist/user-agent-check.js || exit 1
          test -f dist/user-agent-override.js || exit 1
          test -d dist/assets || exit 1
          
          echo "✅ All required files present!"

      - name: Upload PR build
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 7

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = `## 🎉 Build Successful!
            
            Your changes have been built successfully. You can download the artifact from the workflow run to test the extension.
            
            ### 📦 Build Artifacts
            - **PR Build**: Download from the Actions tab
            - **Commit**: ${context.sha.substring(0, 7)}
            
            ### 🧪 Testing
            1. Download the \`pr-build-${context.issue.number}\` artifact
            2. Extract the files
            3. Load unpacked extension in Chrome
            4. Test your changes
            
            ---
            Build completed at: ${new Date().toISOString()}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
